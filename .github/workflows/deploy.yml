name: Deploy ProHelper Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        required: true
        default: both
        type: choice
        options:
          - both
          - marketing
          - lk

concurrency:
  group: prohelper-frontend-deploy
  cancel-in-progress: false

jobs:
  deploy-marketing:
    if: github.event_name == 'push' || inputs.target == 'both' || inputs.target == 'marketing'
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: '22'
      RELEASES_ROOT: /var/www/prohelper_marketing/releases
      CURRENT_LINK: /var/www/prohelper_marketing/current
      KEEP_RELEASES: '5'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build marketing SSR
        run: |
          npm run build:marketing
          if [ -f dist/server/importBuild.cjs ]; then
            sed -i 's|../../node_modules|../node_modules|g' dist/server/importBuild.cjs
          fi

      - name: Prepare marketing artefact
        run: |
          rm -rf .deploy/marketing
          mkdir -p .deploy/marketing
          cp -R dist/client .deploy/marketing/client
          cp -R dist/server .deploy/marketing/server
          cp ecosystem.config.cjs package.json package-lock.json .deploy/marketing/
          tar -czf marketing.tgz -C .deploy/marketing .

      - name: Upload marketing artefact
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          source: marketing.tgz
          target: /tmp/

      - name: Deploy marketing on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail

            SHA_SHORT="$(printf '%s' '${{ github.sha }}' | cut -c1-7)"
            RELEASE_ID="$(date +%Y%m%d%H%M%S)-$SHA_SHORT"
            RELEASE_PATH="${{ env.RELEASES_ROOT }}/$RELEASE_ID"
            PREVIOUS_RELEASE="$(readlink -f "${{ env.CURRENT_LINK }}" || true)"

            mkdir -p "${{ env.RELEASES_ROOT }}"
            mkdir -p "$RELEASE_PATH"

            tar -xzf /tmp/marketing.tgz -C "$RELEASE_PATH"
            rm -f /tmp/marketing.tgz

            cd "$RELEASE_PATH"
            npm install --omit=dev --no-audit --no-fund

            ln -sfn "$RELEASE_PATH" "${{ env.CURRENT_LINK }}"

            if pm2 describe prohelper-ssr >/dev/null 2>&1; then
              pm2 startOrReload "${{ env.CURRENT_LINK }}/ecosystem.config.cjs" --only prohelper-ssr --update-env
            else
              pm2 start "${{ env.CURRENT_LINK }}/ecosystem.config.cjs" --only prohelper-ssr --update-env
            fi

            sleep 5

            if ! curl -fsS http://127.0.0.1:3001 >/dev/null; then
              if [ -n "$PREVIOUS_RELEASE" ] && [ -d "$PREVIOUS_RELEASE" ]; then
                ln -sfn "$PREVIOUS_RELEASE" "${{ env.CURRENT_LINK }}"
                pm2 startOrReload "${{ env.CURRENT_LINK }}/ecosystem.config.cjs" --only prohelper-ssr --update-env || true
              fi
              exit 1
            fi

            pm2 save

            ls -1dt "${{ env.RELEASES_ROOT }}"/* | tail -n +$((${{ env.KEEP_RELEASES }} + 1)) | xargs -r rm -rf

  deploy-lk:
    if: github.event_name == 'push' || inputs.target == 'both' || inputs.target == 'lk'
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: '22'
      RELEASES_ROOT: /var/www/prohelper_lk/releases
      CURRENT_LINK: /var/www/prohelper_lk/current
      KEEP_RELEASES: '5'
      VITE_API_URL: https://api.prohelper.pro
      VITE_REVERB_APP_KEY: 1234567890abcdef1234567890abcdef
      VITE_REVERB_HOST: api.prohelper.pro
      VITE_REVERB_PORT: 443
      VITE_REVERB_SCHEME: https
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build lk
        run: npm run build:lk

      - name: Prepare lk artefact
        run: |
          rm -rf .deploy/lk
          mkdir -p .deploy/lk
          cp -R dist-lk/. .deploy/lk/
          tar -czf lk.tgz -C .deploy/lk .

      - name: Upload lk artefact
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          source: lk.tgz
          target: /tmp/

      - name: Deploy lk on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail

            SHA_SHORT="$(printf '%s' '${{ github.sha }}' | cut -c1-7)"
            RELEASE_ID="$(date +%Y%m%d%H%M%S)-$SHA_SHORT"
            RELEASE_PATH="${{ env.RELEASES_ROOT }}/$RELEASE_ID"
            PREVIOUS_RELEASE="$(readlink -f "${{ env.CURRENT_LINK }}" || true)"

            mkdir -p "${{ env.RELEASES_ROOT }}"
            mkdir -p "$RELEASE_PATH"

            tar -xzf /tmp/lk.tgz -C "$RELEASE_PATH"
            rm -f /tmp/lk.tgz

            if [ ! -f "$RELEASE_PATH/index.html" ]; then
              rm -rf "$RELEASE_PATH"
              exit 1
            fi

            ln -sfn "$RELEASE_PATH" "${{ env.CURRENT_LINK }}"

            if [ ! -f "${{ env.CURRENT_LINK }}/index.html" ]; then
              if [ -n "$PREVIOUS_RELEASE" ] && [ -d "$PREVIOUS_RELEASE" ]; then
                ln -sfn "$PREVIOUS_RELEASE" "${{ env.CURRENT_LINK }}"
              fi
              exit 1
            fi

            ls -1dt "${{ env.RELEASES_ROOT }}"/* | tail -n +$((${{ env.KEEP_RELEASES }} + 1)) | xargs -r rm -rf
